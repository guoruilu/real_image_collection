name: eh
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # PyTorch with CUDA 12.6 (use the pytorch wheel index)
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.6.0
      - torchvision==0.21.0
      - torchaudio==2.6.0

      # Core pipeline
      - ultralytics==8.4.48
      - open_clip_torch==3.3.0
      - icrawler==0.6.10

      # Image I/O
      - pillow>=11.1
      - pi-heif
      - opencv-python==4.11.0.86

      # Misc (auto-installed by above; pinned for reproducibility)
      - numpy==1.26.4
      - huggingface_hub==1.14.0
      - timm==1.0.27
      - safetensors==0.7.0
      - ftfy==6.3.1
      - tqdm==4.67.1
